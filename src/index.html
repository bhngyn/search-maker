<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title id="app-title-meta">أداة بناء استعلامات البحث</title>
<script type="module" src="./main.js"></script>
</head>
<body class="lang-ar">
<div class="app">

  <header class="app-header">
    <div class="app-header-titles">
      <h1 class="app-title" id="app-title"></h1>
      <p class="app-subtitle" id="app-subtitle"></p>
    </div>
    <div class="app-controls" role="group" aria-label="إعدادات الأداة">
      <div class="control-group">
        <span class="control-label">محرك البحث</span>
        <div class="engine-toggle" role="group" id="engine-toggle-group" aria-label="">
          <button id="engine-btn-google" type="button" aria-pressed="true">Google</button>
          <button id="engine-btn-x" type="button" aria-pressed="false"></button>
          <button id="engine-btn-facebook" type="button" aria-pressed="false">Facebook</button>
        </div>
      </div>
      <div class="control-group">
        <span class="control-label">اللغة</span>
        <div class="lang-toggle" role="group" id="lang-toggle-group" aria-label="">
          <button id="lang-btn-ar" type="button" aria-pressed="true"></button>
          <button id="lang-btn-en" type="button" aria-pressed="false"></button>
        </div>
      </div>
      <div class="control-group control-group-normalize">
        <div class="normalize-toggle">
          <label>
            <input type="checkbox" id="normalize-toggle-input">
            <span id="normalize-label-text"></span>
          </label>
          <button type="button" id="normalize-info-btn" class="normalize-info-btn" aria-expanded="false" aria-controls="normalize-info-panel" title="">i</button>
        </div>
        <div id="normalize-info-panel" class="normalize-info-panel" hidden></div>
      </div>
    </div>
  </header>

  <main>
    <section id="welcome-panel" class="welcome-panel" aria-labelledby="welcome-heading">
      <p id="welcome-heading">
        <span id="welcome-blurb"></span>
        <button type="button" class="welcome-close-btn" id="welcome-close-btn" aria-label=""></button>
      </p>
    </section>

    <section class="chip-section" aria-labelledby="chip-section-heading">
      <h2 id="chip-section-heading"></h2>
      <div id="chip-area"></div>
      <aside id="chip-toolbar" hidden></aside>
      <div id="composer"></div>
    </section>

    <section id="facebook-form" aria-labelledby="facebook-form-heading">
      <h2 id="facebook-form-heading" class="sr-only"></h2>
    </section>

    <div id="warnings-region" class="warnings-region" aria-live="polite"></div>
    <div id="tips-region" class="tips-region" aria-live="polite"></div>

    <section class="preview-section preview-section-sticky">
      <h2 class="preview-heading" id="preview-heading"></h2>
      <div id="preview-box" class="preview-box empty" dir="ltr" aria-live="polite"></div>
      <div class="action-row">
        <button id="copy-btn" class="btn-emphasis" type="button" disabled></button>
        <button id="search-btn" class="btn-primary" type="button" disabled></button>
        <button id="undo-btn" class="btn-secondary" type="button" disabled aria-keyshortcuts="Control+Z Meta+Z"></button>
        <button id="reset-btn" class="btn-danger" type="button"></button>
      </div>
    </section>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
</div>
</body>
</html>
